---
deployment:
  tasks:
    - export DEPLOY_PATH=/home/devima/public_html # Cambia "usuario" por tu usuario de cPanel
    - echo "Iniciando despliegue en $DEPLOY_PATH"

    # Paso 1: Instalar dependencias
    - /opt/cpanel/ea-nodejs18/bin/npm install --prefix=$PWD

    # Paso 2: Construir el proyecto
    - /opt/cpanel/ea-nodejs18/bin/npm run build --prefix=$PWD

    # Paso 3: Limpiar contenido antiguo en public_html
    - rm -rf $DEPLOY_PATH/*
